<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crossword Solver</title>
  <link rel="stylesheet" href="/static/css/style.css?v=4">
</head>
<body>

<div id="landscape-msg">
  <p>Rotate to portrait mode to use the solver.</p>
</div>

<div class="page">
  <header>
    <h1>Crossword Solver</h1>
    <p id="puzzle-meta"></p>
  </header>

  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <div id="clue-text"></div>

  <div id="action-bar">
    <button class="btn" id="btn-save">Save</button>
    <button class="btn" id="btn-suggest" disabled>Suggest</button>
    <button class="btn" id="btn-exit">Exit</button>
    <button class="btn mobile-only" id="btn-next">Next</button>
    <div class="settings-wrap">
      <button class="btn" id="btn-settings" title="Settings">⚙</button>
      <div class="settings-menu" id="settings-menu">
        <button class="settings-item" id="opt-autosuggest">
          <span class="check">✓</span>Auto-suggest
        </button>
      </div>
    </div>
  </div>

  <div id="suggestions"></div>

  <footer>
    <p>&copy; 2026 Krishna Ratakonda</p>
  </footer>
</div>

<div id="toast"></div>

<script src="/static/js/solve.js?v=4"></script>
</body>
</html>
