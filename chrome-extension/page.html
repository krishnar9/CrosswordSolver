<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYT Crossword Filler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 32px 36px;
      width: 380px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin: 0 0 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #333;
    }

    #fileInput {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      font-size: 13px;
    }

    #gridInfo {
      font-size: 12px;
      color: #555;
      min-height: 18px;
      margin-bottom: 18px;
    }

    #fillBtn {
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    #fillBtn:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    #fillBtn:hover:not(:disabled) {
      background: #333;
    }

    #diagBtn {
      width: 100%;
      margin-top: 8px;
      padding: 7px;
      background: none;
      color: #555;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #diagBtn:hover { background: #f0f0f0; }

    #diagOut {
      margin-top: 12px;
      padding: 10px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .status {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }
    .status.info    { display: block; background: #e8f0fe; color: #1a73e8; }
    .status.success { display: block; background: #e6f4ea; color: #188038; }
    .status.error   { display: block; background: #fce8e6; color: #c5221f; }
    .status.warning { display: block; background: #fef7e0; color: #b06000; }

    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>NYT Crossword Filler</h1>
    <p class="subtitle">Fills in the NYT crossword using a solver output file.</p>

    <label for="fileInput">Solver output file (.txt):</label>
    <input type="file" id="fileInput" accept=".txt">
    <div id="gridInfo"></div>

    <button id="fillBtn" disabled>Fill Crossword</button>
    <button id="diagBtn">Diagnose Page</button>
    <div id="status" class="status"></div>
    <div id="diagOut"></div>

    <p class="hint">
      The NYT crossword must be open in another tab.<br>
      The extension will find it automatically.
    </p>
  </div>
  <script src="page.js"></script>
</body>
</html>
