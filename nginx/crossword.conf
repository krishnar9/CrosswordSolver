server {
    listen 192.168.1.2:80;
    server_name krishna.local 192.168.1.2;
    return 301 https://$host$request_uri;
}

server {
    listen 192.168.1.2:443 ssl;
    server_name krishna.local 192.168.1.2;

    ssl_certificate     /etc/ssl/certs/krishna-local.crt;
    ssl_certificate_key /etc/ssl/private/krishna-local.key;

    client_max_body_size 25M;

    location /crossplay/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /crossplay;
        proxy_read_timeout 120s;
    }

    # Static assets for the crossword app — HTML uses bare /static/... paths.
    location /static/ {
        proxy_pass http://127.0.0.1:8001/static/;
    }

    location /crossword/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /crossword;
        proxy_read_timeout 30s;
    }
}
